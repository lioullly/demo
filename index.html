<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Handwriting Sync</title>
<style>
:root {
  --bg: #f5f5f5;
  --panel: #fff;
  --border: #e0e0e0;
  --accent: #a78bfa;
  --text: #1a1a1a;
  --sub: #888;
  --danger: #ef4444;
  --success: #22c55e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  overflow: hidden;
  height: 100dvh;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── 顶栏 ── */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
#room-badge {
  font-size: 12px; font-weight: 700; color: var(--accent);
  background: #f3f0ff; padding: 4px 10px; border-radius: 6px;
  letter-spacing: 0.15em; font-family: monospace;
}
#status-dot { font-size: 11px; padding: 4px 10px; border-radius: 10px; }
.status-ok { color: var(--success); background: #f0fdf4; }
.status-wait { color: #f59e0b; background: #fffbeb; }
.spacer { flex: 1; }
#host-input-box { display: flex; gap: 4px; align-items: center; }
#host-input-box input { width: 130px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
#host-input-box button {
  padding: 4px 10px; border: none; border-radius: 4px;
  background: var(--accent); color: #fff; font-size: 12px; cursor: pointer;
}
#host-input-box button.scan { background: #fff; color: var(--accent); border: 1px solid var(--accent); }

/* ── 工具栏 ── */
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#toolbar button {
  padding: 5px 12px; border: 1px solid #d0d0d0; border-radius: 6px;
  background: #fff; cursor: pointer; font-size: 12px; transition: all 0.15s;
}
#toolbar button:hover { background: #f0f0f0; }
#toolbar button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
#toolbar input[type="color"] { width: 28px; height: 26px; border: none; cursor: pointer; border-radius: 4px; }
#toolbar input[type="range"] { width: 80px; }

/* ── 双面板 ── */
#panels {
  display: flex; flex: 1; overflow: hidden; gap: 12px; padding: 12px;
}
.panel {
  flex: 1; display: flex; flex-direction: column;
  background: var(--panel); border-radius: 8px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  min-width: 0;
}
.panel-header {
  font-size: 11px; font-weight: 600; color: var(--sub);
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 6px;
}
.panel-header .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-mine { background: var(--accent); }
.dot-peer { background: var(--success); }
.canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
canvas.readonly { cursor: default; }

/* ── 文字输入 ── */
#text-overlay {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); z-index: 100;
  width: 280px;
}
#text-overlay.show { display: block; }
#text-overlay textarea { width: 100%; height: 80px; border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 14px; resize: none; }
#text-overlay button {
  margin-top: 8px; padding: 6px 16px; border: none; border-radius: 4px;
  background: var(--accent); color: #fff; font-size: 13px; cursor: pointer;
}

/* ── 响应式 ── */
@media (max-width: 600px) {
  #panels { flex-direction: column; gap: 8px; padding: 6px; }
  .panel { flex: none; height: 45dvh; }
  #topbar { gap: 4px; }
  #host-input-box input { width: 90px; }
}
</style>
</head>
<body>
<div id="app">
  <!-- 顶栏 -->
  <div id="topbar">
    <span id="room-badge">Room: —</span>
    <span id="status-dot" class="status-wait">未连接</span>
    <span class="spacer"></span>
    <div id="host-input-box">
      <input id="host-addr" placeholder="输入IP" value="" />
      <button class="scan" id="btn-scan">扫描</button>
      <button id="btn-connect">连接</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div id="toolbar">
    <button id="btn-pen" class="on">pen</button>
    <button id="btn-eraser">eraser</button>
    <button id="btn-text">text</button>
    <input type="color" id="color-picker" value="#1a1a1a" />
    <input type="range" id="size-slider" min="1" max="20" value="3" />
    <span class="spacer"></span>
    <button id="btn-view-both" class="on">双页</button>
    <button id="btn-view-mine">我的</button>
  </div>

  <!-- 双面板 -->
  <div id="panels">
    <!-- 对方 -->
    <div class="panel" id="panel-peer">
      <div class="panel-header"><span class="dot dot-peer"></span>朋友的笔记</div>
      <div class="canvas-wrap" id="wrap-peer">
        <canvas id="cv-peer-bg"></canvas><canvas id="cv-peer-fg" class="readonly"></canvas>
      </div>
    </div>
    <!-- 自己 -->
    <div class="panel" id="panel-mine">
      <div class="panel-header"><span class="dot dot-mine"></span>我的笔记</div>
      <div class="canvas-wrap" id="wrap-mine">
        <canvas id="cv-mine-bg"></canvas><canvas id="cv-mine-fg"></canvas>
      </div>
    </div>
  </div>

  <!-- 文字弹窗 -->
  <div id="text-overlay">
    <textarea id="text-input" placeholder="输入文字..."></textarea>
    <button id="text-send">发送</button>
    <button id="text-cancel" style="background:#888;margin-left:4px;">取消</button>
  </div>
</div>
<script src="./browser.js" type="module"></script>
</body>
</html>
