<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Note Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }
    /* 工具栏 */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    #toolbar button {
      padding: 6px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    #toolbar button:hover { background: #f0f0f0; }
    #toolbar button.active { background: #a78bfa; color: #fff; border-color: #a78bfa; }
    #toolbar input[type="color"] { width: 32px; height: 28px; border: none; cursor: pointer; }
    #toolbar input[type="range"] { width: 80px; }
    #toolbar .spacer { flex: 1; }
    #status {
      font-size: 12px;
      color: #888;
      padding: 4px 8px;
    }
    .status-connected { color: #22c55e; }
    .status-disconnected { color: #f59e0b; }

    /* 画布区 */
    #canvas-container {
      flex: 1;
      position: relative;
      background: #fafafa;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
    }

    /* 对端标签 */
    #peer-label {
      position: fixed;
      top: 60px;
      right: 16px;
      background: #22c55e;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 10px;
      display: none;
      z-index: 10;
    }
    #peer-label.show { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 工具栏 -->
    <div id="toolbar">
      <button id="btn-pen" class="active" title="钢笔">pen</button>
      <button id="btn-eraser" title="橡皮擦">eraser</button>
      <input type="color" id="color-picker" value="#1a1a1a" title="颜色" />
      <input type="range" id="size-slider" min="1" max="20" value="3" title="粗细" />
      <span class="spacer"></span>
      <span id="status" class="status-disconnected">● 等待连接</span>
    </div>

    <!-- 画布 -->
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="fg-canvas"></canvas>
    </div>

    <!-- 对端连接提示 -->
    <div id="peer-label">已连接</div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
